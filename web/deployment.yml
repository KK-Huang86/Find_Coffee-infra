apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: find-coffee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: migrate
          image: vup4k0806/find_coffee:8a5317c
          command: ["python", "manage.py", "migrate"]
          envFrom:
            - configMapRef:
                name: find-coffee-config
            - secretRef:
                name: find-coffee-secret
      containers:
        - name: web
          image: vup4k0806/find_coffee:8a5317c
          ports:
            - containerPort: 8000

          livenessProbe:
            httpGet:
              path: /health/live/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          envFrom:
            - configMapRef:
                name: find-coffee-config
            - secretRef:
                name: find-coffee-secret
