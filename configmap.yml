apiVersion: v1
kind: ConfigMap
metadata:
  name: find-coffee-config
  namespace: find-coffee
data:
  DB_ENGINE: "django.db.backends.postgresql"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  # 不設 production 以避免 Celery 切換到 SQS
  ENVIRONMENT: "staging"
  AWS_REGION: "ap-northeast-1"
